default_target: qemux86-64
sdk:
  image: ghcr.io/avocado-framework/avocado-sdk:latest
runtimes:
  default:
    target: x86_64-unknown-linux-gnu

permissions:
  main:
    users:
      root:
        password: ''
      avocado:
        uid: 1000
        groups:
        - avocado
        password: $6$9YieAo4LtYEIqB6K$og/ykbnIiXP21yc6WHAVKkkIMNE5jaho8Ijj6zFo0UlOxWGpH9xrduFc0P9UYBtQXz2LrJjx7DK7/XAObLoqh0
        gecos: Avocado service user
        home: /home/avocado
        shell: /bin/bash
    groups:
      avocado:
        gid: 1000

rootfs:
  default:
    packages:
      avocado-pkg-rootfs: '*'
    permissions: main

initramfs:
  default:
    packages:
      avocado-pkg-initramfs: '*'
    permissions: main
