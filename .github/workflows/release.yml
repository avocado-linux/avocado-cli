name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/test-reusable.yml

  security:
    name: Security Audit
    uses: ./.github/workflows/security-reusable.yml

  create-release:
    permissions:
      contents: write
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v5
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

  release:
    permissions:
      contents: write
    name: Build and Upload Release Assets
    runs-on: ${{ matrix.os }}
    needs: [test, security, create-release]
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            suffix: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: .exe

    steps:
      - name: Install build pre-reqs (Windows)
        if: ${{ runner.os == 'Windows' }}
        run: |
          choco install nasm cmake -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install cmake (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: brew install cmake

      - name: Install cmake (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: sudo apt-get update && sudo apt-get install -y cmake

      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}

      - uses: taiki-e/install-action@v2
        if: ${{ contains(fromJSON('["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]'), matrix.target) }}
        with:
          tool: cross

      - uses: Swatinem/rust-cache@v2

      - name: cargo build release
        if: ${{ !contains(fromJSON('["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]'), matrix.target) }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: cross build release
        if: ${{ contains(fromJSON('["aarch64-unknown-linux-musl", "x86_64-unknown-linux-musl"]'), matrix.target) }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Codesign executable
        if: ${{ contains(matrix.target, 'apple-darwin') }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_CODESIGNING_IDENTITY: ${{ secrets.APPLE_CODESIGNING_IDENTITY }}
        run: |
          # create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # import certificate
          echo -n "$MACOS_CERTIFICATE" | base64 --decode --output $CERTIFICATE_PATH

          # create temporary keychain
          security -q create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security -q default-keychain -s $KEYCHAIN_PATH
          security -q unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # make cert accessible by codesign
          security -q import $CERTIFICATE_PATH -P "$MACOS_CERTIFICATE_PWD" -k $KEYCHAIN_PATH -T /usr/bin/codesign

          # avoid password prompt
          security -q set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # give permissions
          chmod +x ./target/${{ matrix.target }}/release/avocado

          # code sign
          /usr/bin/codesign -s $APPLE_CODESIGNING_IDENTITY --deep -f --timestamp -o runtime ./target/${{ matrix.target }}/release/avocado

          # verify signing
          /usr/bin/codesign --verify --strict ./target/${{ matrix.target }}/release/avocado

          # zip file, notarize tool only works with zip files
          ditto -c -k --sequesterRsrc --keepParent "./target/${{ matrix.target }}/release/avocado" "./target/${{ matrix.target }}/release/avocado.zip"

          # notarize app
          xcrun notarytool submit \
            --wait \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APP_PASSWORD" \
            "./target/${{ matrix.target }}/release/avocado.zip"

      - name: Package release
        run: |
          mv ./target/${{ matrix.target }}/release/avocado${{ matrix.suffix }} ./avocado${{ matrix.suffix }}
          tar -czf avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz ./avocado${{ matrix.suffix }}

      - name: Compute SHA256
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shasum -a 256 avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz \
            > avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz.sha256

      - name: Compute SHA256 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = "avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz"
          $hash = (Get-FileHash -Algorithm SHA256 $file).Hash.ToLower()
          "$hash  $file" | Out-File -FilePath "$file.sha256" -Encoding ascii -NoNewline

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz
            avocado-${{ github.ref_name }}_${{ matrix.target }}.tar.gz.sha256

  sha256sums:
    permissions:
      contents: write
    name: Aggregate SHA256SUMS
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Download per-tarball SHA256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p sums
          cd sums
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern '*.sha256'

      - name: Concatenate into SHA256SUMS
        run: |
          cat sums/*.sha256 > SHA256SUMS
          cat SHA256SUMS

      - name: Upload SHA256SUMS to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS

  bump-homebrew-tap:
    name: Bump Homebrew tap formula
    runs-on: ubuntu-latest
    needs: [sha256sums]
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Download per-tarball SHA256 files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p sums
          cd sums
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern '*.sha256'

      - name: Extract SHA256s into env vars
        run: |
          TAG="${{ github.ref_name }}"
          extract() {
            local target="$1"
            local file="sums/avocado-${TAG}_${target}.tar.gz.sha256"
            if [ ! -f "$file" ]; then
              echo "Missing SHA256 file for ${target}: $file" >&2
              exit 1
            fi
            awk '{print $1}' "$file"
          }
          {
            echo "SHA_MACOS_ARM64=$(extract aarch64-apple-darwin)"
            echo "SHA_MACOS_X86_64=$(extract x86_64-apple-darwin)"
            echo "SHA_LINUX_ARM64=$(extract aarch64-unknown-linux-musl)"
            echo "SHA_LINUX_X86_64=$(extract x86_64-unknown-linux-gnu)"
          } >> "$GITHUB_ENV"

      - name: Check out homebrew tap
        uses: actions/checkout@v5
        with:
          repository: avocado-linux/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Rewrite formula
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          path = "Formula/avocado-cli.rb"
          with open(path) as f:
              src = f.read()
          tag = os.environ["TAG"]
          src = re.sub(r'version "[^"]+"', f'version "{tag}"', src, count=1)
          mapping = [
              ("aarch64-apple-darwin",         os.environ["SHA_MACOS_ARM64"]),
              ("x86_64-apple-darwin",          os.environ["SHA_MACOS_X86_64"]),
              ("aarch64-unknown-linux-musl",   os.environ["SHA_LINUX_ARM64"]),
              ("x86_64-unknown-linux-gnu",     os.environ["SHA_LINUX_X86_64"]),
          ]
          for target, sha in mapping:
              pattern = re.compile(
                  r'(url\s+"[^"]*' + re.escape(target) + r'\.tar\.gz"\s*\n\s*sha256\s+")[0-9a-f]+(")',
                  re.MULTILINE,
              )
              new_src, n = pattern.subn(r'\g<1>' + sha + r'\g<2>', src)
              if n != 1:
                  print(f"Failed to substitute sha256 for {target} (matches: {n})", file=sys.stderr)
                  sys.exit(1)
              src = new_src
          with open(path, "w") as f:
              f.write(src)
          PY
          cat Formula/avocado-cli.rb

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "avocado-release-bot"
          git config user.email "release-bot@avocadolinux.org"
          if git diff --quiet; then
            echo "Formula already up to date for ${TAG}; nothing to commit."
            exit 0
          fi
          git add Formula/avocado-cli.rb
          git commit -m "avocado-cli ${TAG}"
          git push
