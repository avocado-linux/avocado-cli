cli_requirement: ">=0.41.0"

default_target: "{target}"

# Add additional supported targets or use "*" for all targets
supported_targets:
  - {target}

##
## Distribution
##

distro:
  release: 2024
  channel: edge

##
## Runtimes
##

runtimes:
  dev:
    extensions:
      - avocado-ext-dev
      - avocado-ext-sshd-dev
      - avocado-bsp-{{ avocado.target.board }}
      - app
    packages:
      avocado-runtime: "*"

##
## Extensions
##

extensions:
  avocado-ext-dev:
    source:
      type: package
      version: "*"

  avocado-ext-sshd-dev:
    source:
      type: package
      version: "*"

  avocado-bsp-{{ avocado.target.board }}:
    source:
      type: package
      version: "*"

  # Generated default app extension
  # Use or modify this to install dependencies and or include sdk compiled code
  app:
    types:
      - sysext
      - confext
    version: "0.1.0"

    # Install additional application dependencies
    #packages:
      #curl: "*"
      #iperf3: "*"

##
## Images
##

rootfs:
  permissions: dev

initramfs:
  permissions: dev

##
## Permissions
##

# NOT FOR PRODUCTION: the `dev` profile sets an empty root password and is
# referenced by rootfs/initramfs above. Define additional profiles with real
# users, groups, and hashed passwords, then point rootfs/initramfs at them via
# `permissions: <name>`.
permissions:
  dev:
    users:
      root:
        password: ""

##
## SDK
##

sdk:
  image: "docker.io/avocadolinux/sdk:{{ config.distro.release }}"

  container_args:
    - --privileged
    - --network=host
    - -v /dev:/dev
    - -v /sys:/sys

  packages:
    avocado-sdk-toolchain: "*"
